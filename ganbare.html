<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>がんばれ</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background-color: black;
        }

        .container {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center; /* 中央に */
            align-items: center;
        }

        span {
            font-size: 8vw; /* 小さめにして確実に表示 */
            font-weight: bold;
            animation: flashy 0.2s infinite;
        }

        @keyframes flashy {
            0% { color: red; }
            20% { color: yellow; }
            40% { color: lime; }
            60% { color: cyan; }
            80% { color: magenta; }
            100% { color: blue; }
        }
    </style>

</head>
<body>

    <div class="container">
        <span>が</span>
        <span>ん</span>
        <span>ば</span>
        <span>れ</span>
    </div>

</body>
</html>
